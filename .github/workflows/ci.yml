name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create env file
        run: |
          cp .env.example .env

      - name: Build containers
        run: | 
          docker compose -f docker-compose.yml build
        
      - name: Start database
        run: |
          docker compose -f docker-compose.yml up -d cityops_db

      - name: Wait for database 
        run: |
          until docker compose -f docker-compose.yml exec -T cityops_db sh -c 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'; do 
            echo "Waiting for database..."
            sleep 2
          done 
      
      - name: Run backend tests
        run: |
          docker compose -f docker-compose.yml run --rm web pytest

      - name: Stop containers
        if: always()
        run: |
          docker compose -f docker-compose.yml down -v
